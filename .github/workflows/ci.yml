name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ clang make nodejs

      - name: Build Release + LSP
        run: make -j"$(nproc)" release

      - name: Run Quality Gate
        run: make check

      - name: Validate VSCode Extension JS
        run: node --check syntax_extension/extension.js
